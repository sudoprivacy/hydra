<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <!--
      Locked down: no remote content. Scripts are the local bundle only; the
      renderer's data plane connects to the loopback sidecar over http/ws on
      127.0.0.1 (any port), which is what connect-src allows.
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'none'; script-src 'self'; style-src 'self' 'unsafe-inline'; connect-src http://127.0.0.1:* http://localhost:* ws://127.0.0.1:* ws://localhost:*; img-src 'self' data:"
    />
    <!-- xterm.js styles, bundled by esbuild from @xterm/xterm/css/xterm.css. -->
    <link rel="stylesheet" href="./out/renderer.css" />
    <title>Hydra</title>
  </head>
  <body>
    <div id="root"></div>
    <script src="./out/renderer.js"></script>
  </body>
</html>
