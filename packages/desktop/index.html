<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <!--
      Locked down: no remote content. Scripts are the local bundle only; the
      renderer's data plane connects to the loopback sidecar over http/ws on
      127.0.0.1 (any port), which is what connect-src allows.
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'none'; script-src 'self'; style-src 'self' 'unsafe-inline'; connect-src http://127.0.0.1:* http://localhost:* ws://127.0.0.1:* ws://localhost:*; img-src 'self' data:"
    />
    <!-- xterm.js styles, bundled by esbuild from @xterm/xterm/css/xterm.css. -->
    <link rel="stylesheet" href="./out/renderer.css" />
    <title>Hydra</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      }
      body {
        margin: 0;
      }
      .hydra-shell {
        display: flex;
        min-height: 100vh;
      }
      .hydra-nav {
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
        width: 190px;
        padding: 1rem;
        border-right: 1px solid rgba(128, 128, 128, 0.3);
      }
      .hydra-brand {
        font-weight: 700;
        font-size: 1.1rem;
        margin-bottom: 0.5rem;
      }
      .hydra-content {
        flex: 1;
        padding: 1.25rem 1.75rem;
      }
      .hydra-status--error,
      .hydra-list__meta {
        opacity: 0.85;
      }
      .hydra-status--error {
        color: #c0392b;
      }
      .hydra-list {
        list-style: none;
        padding: 0;
        margin: 0;
      }
      .hydra-list__item {
        display: flex;
        gap: 0.75rem;
        align-items: baseline;
        padding: 0.4rem 0;
        border-bottom: 1px solid rgba(128, 128, 128, 0.15);
      }
      .hydra-list__title {
        font-weight: 600;
      }
      .hydra-list__actions {
        margin-left: auto;
        display: flex;
        gap: 0.75rem;
      }
      .hydra-empty {
        opacity: 0.7;
      }

      /* ── Mission Control (M2) ─────────────────────────────────────────── */
      :root {
        --hy-bg: #ffffff;
        --hy-panel: #f6f7f9;
        --hy-tile: #ffffff;
        --hy-border: rgba(0, 0, 0, 0.12);
        --hy-border-strong: rgba(0, 0, 0, 0.2);
        --hy-text: #1b1f24;
        --hy-muted: rgba(0, 0, 0, 0.55);
        --hy-accent: #2f6feb;
        --hy-accent-contrast: #ffffff;
        --hy-danger: #c0392b;
        --hy-warn: #b9761b;
        --hy-ok: #2e9e5b;
        --hy-shadow: 0 1px 2px rgba(0, 0, 0, 0.08), 0 8px 24px rgba(0, 0, 0, 0.08);
        --hy-run-running: #2e9e5b;
        --hy-run-idle: #6b7280;
        --hy-run-needs-input: #b9761b;
        --hy-run-error: #c0392b;
        --hy-run-unknown: #9aa0a6;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --hy-bg: #14171b;
          --hy-panel: #1b1f24;
          --hy-tile: #21262d;
          --hy-border: rgba(255, 255, 255, 0.1);
          --hy-border-strong: rgba(255, 255, 255, 0.2);
          --hy-text: #e6e9ee;
          --hy-muted: rgba(255, 255, 255, 0.55);
          --hy-accent: #4f8cff;
          --hy-danger: #e5645a;
          --hy-warn: #e0a44a;
          --hy-ok: #4cc07f;
          --hy-run-running: #4cc07f;
          --hy-run-idle: #9aa4b2;
          --hy-run-needs-input: #e0a44a;
          --hy-run-error: #e5645a;
          --hy-run-unknown: #7d848e;
        }
      }
      body {
        background: var(--hy-bg);
        color: var(--hy-text);
      }

      .hydra-board {
        display: flex;
        flex-direction: column;
        gap: 1rem;
      }
      .hydra-board__bar {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 0.75rem 1.25rem;
        padding-bottom: 0.75rem;
        border-bottom: 1px solid var(--hy-border);
      }
      .hydra-board__heading {
        display: flex;
        align-items: center;
        gap: 0.6rem;
      }
      .hydra-board__heading h1 {
        margin: 0;
        font-size: 1.25rem;
      }
      .hydra-live {
        display: inline-flex;
        align-items: center;
        gap: 0.35rem;
        font-size: 0.72rem;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        color: var(--hy-muted);
      }
      .hydra-live__dot {
        width: 0.5rem;
        height: 0.5rem;
        border-radius: 50%;
        background: var(--hy-run-unknown);
      }
      .hydra-live--on .hydra-live__dot {
        background: var(--hy-ok);
        box-shadow: 0 0 0 3px rgba(46, 158, 91, 0.2);
      }
      .hydra-live--off .hydra-live__dot {
        background: var(--hy-warn);
      }
      .hydra-board__stats {
        display: flex;
        gap: 1rem;
      }
      .hydra-stat {
        display: flex;
        flex-direction: column;
        line-height: 1.1;
      }
      .hydra-stat__value {
        font-size: 1.05rem;
        font-weight: 700;
      }
      .hydra-stat__label {
        font-size: 0.68rem;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        color: var(--hy-muted);
      }
      .hydra-stat--accent .hydra-stat__value {
        color: var(--hy-accent);
      }
      .hydra-stat--warn .hydra-stat__value {
        color: var(--hy-warn);
      }
      .hydra-board__actions {
        display: flex;
        gap: 0.4rem;
        margin-left: auto;
        flex-wrap: wrap;
      }

      .hydra-btn {
        appearance: none;
        font: inherit;
        font-size: 0.82rem;
        line-height: 1;
        padding: 0.45rem 0.7rem;
        border-radius: 6px;
        border: 1px solid var(--hy-border-strong);
        background: var(--hy-tile);
        color: var(--hy-text);
        cursor: pointer;
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        gap: 0.3rem;
      }
      .hydra-btn:hover {
        border-color: var(--hy-accent);
      }
      .hydra-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      .hydra-btn--primary {
        background: var(--hy-accent);
        border-color: var(--hy-accent);
        color: var(--hy-accent-contrast);
      }
      .hydra-btn--danger {
        color: var(--hy-danger);
        border-color: var(--hy-danger);
      }
      .hydra-btn--danger:hover {
        background: var(--hy-danger);
        color: #fff;
      }
      .hydra-btn--sm {
        font-size: 0.74rem;
        padding: 0.28rem 0.5rem;
      }

      .hydra-board__groups {
        display: flex;
        flex-direction: column;
        gap: 1.5rem;
      }
      .hydra-board__empty {
        padding: 2.5rem 0;
        text-align: center;
      }
      .hydra-muted {
        color: var(--hy-muted);
      }
      .hydra-group__head {
        display: flex;
        align-items: center;
        gap: 0.6rem;
        margin-bottom: 0.6rem;
      }
      .hydra-group__title {
        margin: 0;
        font-size: 0.95rem;
        display: inline-flex;
        align-items: center;
        gap: 0.4rem;
      }
      .hydra-group__icon {
        color: var(--hy-muted);
      }
      .hydra-group__count {
        font-size: 0.78rem;
        color: var(--hy-muted);
        background: var(--hy-panel);
        border-radius: 999px;
        padding: 0.05rem 0.5rem;
      }
      .hydra-group__grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        gap: 0.75rem;
      }

      .hydra-tile {
        display: flex;
        flex-direction: column;
        gap: 0.4rem;
        padding: 0.7rem 0.8rem;
        border: 1px solid var(--hy-border);
        border-left: 3px solid var(--hy-run-unknown);
        border-radius: 8px;
        background: var(--hy-tile);
        box-shadow: var(--hy-shadow);
      }
      .hydra-tile--stopped {
        opacity: 0.72;
        border-left-color: var(--hy-run-unknown);
      }
      .hydra-tile--copilot {
        border-left-color: var(--hy-accent);
      }
      .hydra-tile__top {
        display: flex;
        align-items: center;
        gap: 0.45rem;
      }
      .hydra-tile__number {
        font-variant-numeric: tabular-nums;
        font-weight: 700;
        color: var(--hy-muted);
      }
      .hydra-tile__name {
        font-weight: 600;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .hydra-tile__badges {
        display: inline-flex;
        align-items: center;
        gap: 0.4rem;
        margin-left: auto;
      }
      .hydra-tile__detail {
        font-size: 0.82rem;
        color: var(--hy-muted);
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .hydra-tile__sub {
        font-size: 0.74rem;
        color: var(--hy-muted);
      }
      .hydra-tile__foot {
        display: flex;
        gap: 0.6rem;
        align-items: baseline;
        font-size: 0.72rem;
        color: var(--hy-muted);
      }
      .hydra-tile__reason {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .hydra-tile__actions {
        display: flex;
        flex-wrap: wrap;
        gap: 0.3rem;
        margin-top: 0.15rem;
      }

      .hydra-runtime {
        font-size: 0.68rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.03em;
        padding: 0.1rem 0.4rem;
        border-radius: 999px;
        color: #fff;
        background: var(--hy-run-unknown);
        white-space: nowrap;
      }
      .hydra-runtime--running { background: var(--hy-run-running); }
      .hydra-runtime--idle { background: var(--hy-run-idle); }
      .hydra-runtime--needs-input { background: var(--hy-run-needs-input); }
      .hydra-runtime--error { background: var(--hy-run-error); }
      .hydra-runtime--unknown { background: var(--hy-run-unknown); }

      .hydra-dot {
        width: 0.55rem;
        height: 0.55rem;
        border-radius: 50%;
        display: inline-block;
        flex: none;
      }
      .hydra-dot--running { background: var(--hy-ok); }
      .hydra-dot--stopped {
        background: transparent;
        border: 1.5px solid var(--hy-run-unknown);
      }

      .hydra-badge {
        font-size: 0.68rem;
        font-weight: 700;
        padding: 0.05rem 0.4rem;
        border-radius: 999px;
        background: var(--hy-panel);
        color: var(--hy-text);
      }
      .hydra-badge--unread {
        background: var(--hy-accent);
        color: var(--hy-accent-contrast);
      }
      .hydra-badge--warn {
        background: var(--hy-warn);
        color: #fff;
      }
      .hydra-chip {
        font-size: 0.66rem;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        color: var(--hy-muted);
        border: 1px solid var(--hy-border-strong);
        border-radius: 999px;
        padding: 0.05rem 0.4rem;
      }
      .hydra-chip--plan {
        color: var(--hy-accent);
        border-color: var(--hy-accent);
      }

      .hydra-banner {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        padding: 0.6rem 0.8rem;
        border-radius: 6px;
        margin-bottom: 0.75rem;
      }
      .hydra-banner--error {
        background: rgba(192, 57, 43, 0.12);
        border: 1px solid var(--hy-danger);
        color: var(--hy-danger);
      }
      .hydra-banner__close,
      .hydra-modal__close {
        margin-left: auto;
        appearance: none;
        border: none;
        background: transparent;
        color: inherit;
        cursor: pointer;
        font-size: 0.9rem;
        line-height: 1;
      }

      /* ── dialogs ── */
      .hydra-modal__backdrop {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.45);
        display: flex;
        align-items: flex-start;
        justify-content: center;
        padding: 8vh 1rem 1rem;
        z-index: 50;
      }
      .hydra-modal {
        width: min(460px, 100%);
        background: var(--hy-bg);
        color: var(--hy-text);
        border: 1px solid var(--hy-border-strong);
        border-radius: 10px;
        box-shadow: var(--hy-shadow);
        overflow: hidden;
      }
      .hydra-modal__head {
        display: flex;
        align-items: center;
        padding: 0.8rem 1rem;
        border-bottom: 1px solid var(--hy-border);
      }
      .hydra-modal__title {
        margin: 0;
        font-size: 1rem;
      }
      .hydra-modal__body {
        padding: 1rem;
      }
      .hydra-form {
        display: flex;
        flex-direction: column;
        gap: 0.7rem;
      }
      .hydra-field {
        display: flex;
        flex-direction: column;
        gap: 0.25rem;
      }
      .hydra-field__label {
        font-size: 0.76rem;
        color: var(--hy-muted);
      }
      .hydra-field__req {
        color: var(--hy-danger);
      }
      .hydra-field__input {
        font: inherit;
        padding: 0.45rem 0.55rem;
        border-radius: 6px;
        border: 1px solid var(--hy-border-strong);
        background: var(--hy-tile);
        color: var(--hy-text);
        width: 100%;
        box-sizing: border-box;
      }
      .hydra-field__input:focus {
        outline: 2px solid var(--hy-accent);
        outline-offset: -1px;
      }
      .hydra-checkbox {
        display: flex;
        gap: 0.5rem;
        align-items: flex-start;
        font-size: 0.82rem;
      }
      .hydra-form__error {
        margin: 0;
        color: var(--hy-danger);
        font-size: 0.82rem;
      }
      .hydra-form__hint {
        margin: 0;
        color: var(--hy-muted);
        font-size: 0.78rem;
      }
      .hydra-form__actions {
        display: flex;
        justify-content: flex-end;
        gap: 0.5rem;
        margin-top: 0.25rem;
      }
      .hydra-segmented {
        display: flex;
        gap: 0.25rem;
        padding: 0.2rem;
        background: var(--hy-panel);
        border-radius: 8px;
      }
      .hydra-segmented--sub {
        background: transparent;
        padding: 0;
      }
      .hydra-seg {
        flex: 1;
        appearance: none;
        font: inherit;
        font-size: 0.8rem;
        padding: 0.35rem 0.5rem;
        border-radius: 6px;
        border: 1px solid transparent;
        background: transparent;
        color: var(--hy-text);
        cursor: pointer;
      }
      .hydra-seg--active {
        background: var(--hy-tile);
        border-color: var(--hy-border-strong);
        font-weight: 600;
      }
      /* Terminal view — self-contained height so it fills the content area
         without altering the shared .hydra-content layout (2.5rem = its
         top+bottom padding). */
      .hydra-terminal {
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
        height: calc(100vh - 2.5rem);
      }
      .hydra-terminal__header {
        display: flex;
        align-items: baseline;
        gap: 0.75rem;
      }
      .hydra-terminal__header h1 {
        margin: 0;
        font-size: 1.1rem;
      }
      .hydra-terminal__session {
        opacity: 0.8;
      }
      .hydra-terminal__status {
        margin-left: auto;
        font-size: 0.8rem;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        opacity: 0.85;
      }
      .hydra-terminal__status--connected {
        color: #2e7d32;
      }
      .hydra-terminal__status--connecting {
        color: #b8860b;
      }
      .hydra-terminal__status--exited {
        color: #c0392b;
      }
      .hydra-terminal__surface {
        flex: 1;
        min-height: 0;
        background: #1e1e1e;
        padding: 0.5rem;
        border-radius: 6px;
        overflow: hidden;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script src="./out/renderer.js"></script>
  </body>
</html>
