<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <!--
      Locked down: no remote content. Scripts are the local bundle only; the
      renderer's data plane connects to the loopback sidecar over http/ws on
      127.0.0.1 (any port), which is what connect-src allows.
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'none'; script-src 'self'; style-src 'self' 'unsafe-inline'; connect-src http://127.0.0.1:* http://localhost:* ws://127.0.0.1:* ws://localhost:*; img-src 'self' data:"
    />
    <!-- xterm.js styles, bundled by esbuild from @xterm/xterm/css/xterm.css. -->
    <link rel="stylesheet" href="./out/renderer.css" />
    <title>Hydra</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      }
      body {
        margin: 0;
      }
      .hydra-shell {
        display: flex;
        min-height: 100vh;
      }
      .hydra-nav {
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
        width: 190px;
        padding: 1rem;
        border-right: 1px solid rgba(128, 128, 128, 0.3);
      }
      .hydra-brand {
        font-weight: 700;
        font-size: 1.1rem;
        margin-bottom: 0.5rem;
      }
      .hydra-content {
        flex: 1;
        padding: 1.25rem 1.75rem;
      }
      .hydra-status--error,
      .hydra-list__meta {
        opacity: 0.85;
      }
      .hydra-status--error {
        color: #c0392b;
      }
      .hydra-list {
        list-style: none;
        padding: 0;
        margin: 0;
      }
      .hydra-list__item {
        display: flex;
        gap: 0.75rem;
        align-items: baseline;
        padding: 0.4rem 0;
        border-bottom: 1px solid rgba(128, 128, 128, 0.15);
      }
      .hydra-list__title {
        font-weight: 600;
      }
      .hydra-list__actions {
        margin-left: auto;
        display: flex;
        gap: 0.75rem;
      }
      .hydra-empty {
        opacity: 0.7;
      }
      /* Terminal view — self-contained height so it fills the content area
         without altering the shared .hydra-content layout (2.5rem = its
         top+bottom padding). */
      .hydra-terminal {
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
        height: calc(100vh - 2.5rem);
      }
      .hydra-terminal__header {
        display: flex;
        align-items: baseline;
        gap: 0.75rem;
      }
      .hydra-terminal__header h1 {
        margin: 0;
        font-size: 1.1rem;
      }
      .hydra-terminal__session {
        opacity: 0.8;
      }
      .hydra-terminal__status {
        margin-left: auto;
        font-size: 0.8rem;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        opacity: 0.85;
      }
      .hydra-terminal__status--connected {
        color: #2e7d32;
      }
      .hydra-terminal__status--connecting {
        color: #b8860b;
      }
      .hydra-terminal__status--exited {
        color: #c0392b;
      }
      .hydra-terminal__surface {
        flex: 1;
        min-height: 0;
        background: #1e1e1e;
        padding: 0.5rem;
        border-radius: 6px;
        overflow: hidden;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script src="./out/renderer.js"></script>
  </body>
</html>
