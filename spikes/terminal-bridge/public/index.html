<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Hydra terminal-bridge spike</title>
  <link rel="stylesheet" href="/vendor/xterm.css" />
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      display: flex;
      flex-direction: column;
      font: 13px/1.4 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #1e1e1e;
      color: #ccc;
    }
    header {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      background: #252526;
      border-bottom: 1px solid #333;
    }
    header label { color: #999; }
    header input[type="text"] {
      width: 320px;
      padding: 4px 6px;
      background: #1e1e1e;
      color: #ddd;
      border: 1px solid #444;
      border-radius: 4px;
      font: inherit;
    }
    header select, header button {
      padding: 4px 8px;
      background: #1e1e1e;
      color: #ddd;
      border: 1px solid #444;
      border-radius: 4px;
      font: inherit;
      cursor: pointer;
    }
    header button.primary { background: #0e639c; border-color: #0e639c; color: #fff; }
    header button:disabled { opacity: 0.5; cursor: default; }
    #status {
      margin-left: auto;
      padding: 3px 10px;
      border-radius: 999px;
      font-weight: 600;
      font-size: 12px;
    }
    #status.disconnected { background: #5a1d1d; color: #ffb4b4; }
    #status.connecting   { background: #5a4a1d; color: #ffe6a1; }
    #status.connected    { background: #1d5a2a; color: #b4ffc4; }
    #dims { color: #777; font-variant-numeric: tabular-nums; }
    #term-wrap { flex: 1 1 auto; min-height: 0; padding: 6px; }
    #term { width: 100%; height: 100%; }
    kbd {
      background: #333; border: 1px solid #555; border-bottom-width: 2px;
      border-radius: 3px; padding: 0 4px; font-size: 11px;
    }
  </style>
</head>
<body>
  <header>
    <label for="session">tmux session</label>
    <input id="session" type="text" placeholder="spike-target" />
    <label for="mode">mode</label>
    <select id="mode" title="grouped = per-client size (recommended); attach = classic (size-coupled)">
      <option value="grouped">grouped</option>
      <option value="attach">attach</option>
    </select>
    <label title="Read-only: keystrokes are dropped (safe for observing real workers)">
      <input id="readonly" type="checkbox" /> read-only
    </label>
    <button id="connect" class="primary">Connect</button>
    <span id="dims">–</span>
    <span id="status" class="disconnected">disconnected</span>
  </header>
  <div id="term-wrap"><div id="term"></div></div>

  <script src="/vendor/xterm.js"></script>
  <script src="/vendor/addon-fit.js"></script>
  <script src="/client.js"></script>
</body>
</html>
