name: Publish Extension

on:
  push:
    tags: ['v*']

  workflow_dispatch:

# Cancel pending runs when new commits arrive
concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm ci

      - name: Read version from package.json
        id: version
        run: |
          # Root package.json is the single source of truth for the release version.
          # sync-version.js keeps every workspace manifest + the packaged .vsix in
          # lockstep, and package-vsix.js fails closed if they diverge.
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Extract release notes from CHANGELOG
        id: release_notes
        run: |
          # Extract the latest section from CHANGELOG.md (between first and second ## headers)
          NOTES=$(awk '/^## \[/{if(found) exit; found=1; next} found{print}' CHANGELOG.md)
          {
            echo 'body<<RELEASE_NOTES_EOF'
            echo "$NOTES"
            echo 'RELEASE_NOTES_EOF'
          } >> $GITHUB_OUTPUT

      - name: Package VSIX
        run: npm run package:vsix

      - name: Publish to VS Code Marketplace
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: |
          for attempt in 1 2 3 4 5; do
            echo "Publishing to VS Code Marketplace (attempt ${attempt}/5)..."
            if npx @vscode/vsce publish \
              --packagePath "hydra-${{ steps.version.outputs.version }}.vsix" \
              --skip-duplicate \
              -p "$VSCE_PAT"; then
              exit 0
            fi

            if [ "$attempt" -eq 5 ]; then
              echo "VS Code Marketplace publish failed after ${attempt} attempts."
              exit 1
            fi

            sleep_seconds=$((attempt * 60))
            echo "Publish failed; retrying in ${sleep_seconds}s..."
            sleep "$sleep_seconds"
          done
        continue-on-error: false

      - name: Publish to Open VSX
        run: npx ovsx publish "hydra-${{ steps.version.outputs.version }}.vsix" -p ${{ secrets.OVSX_PAT }}
        continue-on-error: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          files: hydra-${{ steps.version.outputs.version }}.vsix
          body: ${{ steps.release_notes.outputs.body }}
          generate_release_notes: ${{ steps.release_notes.outputs.body == '' }}
